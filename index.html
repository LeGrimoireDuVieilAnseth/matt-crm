<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Studio, l'atelier de Matt</title>
<meta name="theme-color" content="#1a1a1c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Studio">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%231a1a1c'/><circle cx='16' cy='16' r='7.5' fill='none' stroke='%23f0f0ee' stroke-width='2'/><circle cx='16' cy='16' r='3' fill='%23e8834a'/><rect x='21' y='9' width='4' height='3' rx='1' fill='%23f0f0ee'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f3f3f1;
    --surface:#ffffff;
    --surface-2:#fafaf8;
    --surface-3:#f0f0ed;
    --ink:#1a1a1c;
    --ink-2:#57575e;
    --ink-3:#94949c;
    --ink-4:#b8b8bd;
    --line:#e7e7e2;
    --line-2:#dcdcd6;
    --white:#ffffff;
    --danger:#c0392b;
    --danger-soft:#fbeae8;
    --ok:#3a7d52;
    --ok-soft:#e8f2ec;
    --warn:#b57d1a;
    --warn-soft:#f9f0dd;
    /* marques */
    --baby:#d78aa2;
    --baby-soft:#fbeef3;
    --lumiere:#b08d57;
    --lumiere-soft:#f6efe3;
    --matt:#e8622a;
    --matt-soft:#fceee7;
    --accent:var(--ink);
    --fill:var(--ink);--fill-ink:#fff;--logo-bg:var(--ink);
    --topbar-bg:rgba(243,243,241,.82);--tabbar-bg:rgba(255,255,255,.9);
    --shadow:0 1px 2px rgba(20,20,24,.05), 0 6px 20px rgba(20,20,24,.04);
    --shadow-lg:0 4px 12px rgba(20,20,24,.08), 0 18px 44px rgba(20,20,24,.10);
    --r:16px;
    --r-sm:11px;
    --tabh:64px;
  }
  html[data-theme="creme"]{--bg:#faf4ea;--surface:#fffdf8;--surface-2:#f6efe1;--surface-3:#efe3d0;--ink:#2c2115;--ink-2:#6b5a45;--ink-3:#9a8a72;--ink-4:#c3b39a;--line:#e6d8c3;--line-2:#dccaad;--accent:#8c6239;}
  html[data-theme="rose"]{--bg:#fdf3f5;--surface:#fffafb;--surface-2:#faedf0;--surface-3:#f3dfe4;--ink:#2f2028;--ink-2:#6e5560;--ink-3:#a08590;--ink-4:#cbb2ba;--line:#f0dbe1;--line-2:#e6c9d1;--accent:#c65b7c;}
  html[data-theme="ocean"]{--bg:#eef5f7;--surface:#ffffff;--surface-2:#f2f8fa;--surface-3:#e4eef1;--ink:#12222a;--ink-2:#4c6069;--ink-3:#849aa2;--ink-4:#aec3ca;--line:#d8e6ea;--line-2:#c8dbe0;--accent:#0e7c8b;}
  html[data-theme="sauge"]{--bg:#f0f4ee;--surface:#ffffff;--surface-2:#f4f8f2;--surface-3:#e6ede2;--ink:#1e271a;--ink-2:#556150;--ink-3:#8a9683;--ink-4:#b6c0af;--line:#dde6d8;--line-2:#ccd8c5;--accent:#4f7a3f;}
  html[data-theme="lavande"]{--bg:#f4f1fa;--surface:#ffffff;--surface-2:#f7f4fc;--surface-3:#eae4f4;--ink:#221b2e;--ink-2:#5a5168;--ink-3:#8f869c;--ink-4:#bcb3c8;--line:#e5ddf1;--line-2:#d7cce9;--accent:#7a5bc6;}
  html[data-theme="sombre"]{--bg:#1e1f22;--surface:#2a2b2f;--surface-2:#26272b;--surface-3:#313237;--ink:#f2f2f4;--ink-2:#b6b6bd;--ink-3:#86868e;--ink-4:#5c5c64;--line:#3a3b40;--line-2:#45464c;--accent:#d8d8de;--fill:#f2f2f4;--fill-ink:#1e1f22;--logo-bg:#3a3b40;--topbar-bg:rgba(30,31,34,.85);--tabbar-bg:rgba(42,43,47,.92);--shadow:0 1px 2px rgba(0,0,0,.4),0 6px 20px rgba(0,0,0,.3);--shadow-lg:0 4px 12px rgba(0,0,0,.5),0 18px 44px rgba(0,0,0,.5);}
  .theme-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 13px;border-radius:12px;border:1.5px solid var(--line-2);background:var(--surface);color:var(--ink-2);font-size:13.5px;font-weight:600;cursor:pointer;}
  .theme-btn.on{border-color:var(--accent);color:var(--ink);}
  .theme-sw{width:18px;height:18px;border-radius:50%;border:1px solid rgba(0,0,0,.15);display:inline-block;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"Inter",system-ui,-apple-system,sans-serif;
    font-size:15px;line-height:1.5;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    padding-bottom:calc(var(--tabh) + env(safe-area-inset-bottom));
    min-height:100vh;
  }
  h1,h2,h3{font-family:"Fraunces",Georgia,serif;font-weight:500;letter-spacing:-.01em;margin:0;}
  a{color:inherit;}
  input,select,textarea,button{font-family:inherit;font-size:inherit;color:inherit;}
  ::selection{background:var(--fill);color:var(--fill-ink);}

  /* ---------- layout ---------- */
  .view{display:none;max-width:720px;margin:0 auto;padding:0 16px 40px;}
  .view.active{display:block;animation:fade .28s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){.view.active{animation:none;}*{transition:none!important;}}

  /* ---------- topbar ---------- */
  .topbar{
    position:sticky;top:0;z-index:40;
    background:var(--topbar-bg);
    backdrop-filter:saturate(140%) blur(14px);
    -webkit-backdrop-filter:saturate(140%) blur(14px);
    border-bottom:1px solid var(--line);
    padding:calc(env(safe-area-inset-top) + 10px) 16px 10px;
  }
  .topbar-inner{max-width:720px;margin:0 auto;display:flex;align-items:center;gap:12px;}
  .brand-mark{
    width:34px;height:34px;border-radius:9px;flex:0 0 auto;
    background:var(--logo-bg);display:grid;place-items:center;color:#fff;
  }
  .brand-mark svg{width:19px;height:19px;}
  .topbar h1{font-size:18px;line-height:1;font-weight:600;flex:1;}
  .topbar .sub{font-size:11px;color:var(--ink-3);font-family:"Inter";letter-spacing:.04em;text-transform:uppercase;display:block;margin-top:3px;}
  .icon-btn{
    width:38px;height:38px;border-radius:10px;border:1px solid var(--line-2);
    background:var(--surface);display:grid;place-items:center;cursor:pointer;color:var(--ink-2);
    transition:.15s;flex:0 0 auto;
  }
  .icon-btn:hover{border-color:var(--ink-4);color:var(--ink);}
  .icon-btn svg{width:19px;height:19px;stroke:currentColor;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  .icon-btn.dot{position:relative;}
  .icon-btn.dot::after{content:"";position:absolute;top:7px;right:8px;width:7px;height:7px;border-radius:50%;background:var(--matt);border:2px solid var(--surface);}

  /* ---------- brand filter ---------- */
  .brandbar{display:flex;gap:8px;overflow-x:auto;margin:16px 0 4px;padding-bottom:2px;scrollbar-width:none;}
  .brandbar::-webkit-scrollbar{display:none;}
  .bchip{
    flex:0 0 auto;display:inline-flex;align-items:center;gap:7px;
    padding:8px 13px;border-radius:999px;border:1px solid var(--line-2);
    background:var(--surface);font-size:13px;font-weight:500;color:var(--ink-2);
    cursor:pointer;transition:.15s;white-space:nowrap;
  }
  .bchip .d{width:9px;height:9px;border-radius:50%;background:var(--ink-4);}
  .bchip[data-b="mybabyshoot"] .d{background:var(--baby);}
  .bchip[data-b="maison-lumiere"] .d{background:var(--lumiere);}
  .bchip[data-b="matt-la-photo"] .d{background:var(--matt);}
  .bchip.on{background:var(--fill);color:var(--fill-ink);border-color:var(--ink);}
  .bchip.on .d{box-shadow:0 0 0 2px rgba(255,255,255,.25);}

  /* ---------- cards ---------- */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0;}
  .stat{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
    padding:15px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden;
  }
  .stat .lab{font-size:12px;color:var(--ink-3);font-weight:500;letter-spacing:.02em;}
  .stat .num{font-family:"Fraunces";font-size:30px;font-weight:500;line-height:1.05;margin-top:5px;letter-spacing:-.02em;}
  .stat .foot{font-size:12px;color:var(--ink-2);margin-top:4px;}
  .stat .num.euro{font-size:26px;}

  .section-title{
    display:flex;align-items:baseline;justify-content:space-between;
    margin:26px 2px 12px;
  }
  .section-title h2{font-size:20px;font-weight:600;}
  .section-title .count{font-size:13px;color:var(--ink-3);font-weight:500;}
  .eyebrow{font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-3);font-weight:600;font-family:"Inter";}

  /* ---------- list rows ---------- */
  .row{
    display:flex;align-items:center;gap:13px;padding:14px 15px;
    background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);
    box-shadow:var(--shadow);cursor:pointer;transition:.15s;margin-bottom:9px;position:relative;
  }
  .row:hover{border-color:var(--line-2);transform:translateY(-1px);box-shadow:var(--shadow-lg);}
  .row::before{content:"";position:absolute;left:0;top:12px;bottom:12px;width:3px;border-radius:3px;background:var(--ink-4);}
  .row[data-b="mybabyshoot"]::before{background:var(--baby);}
  .row[data-b="maison-lumiere"]::before{background:var(--lumiere);}
  .row[data-b="matt-la-photo"]::before{background:var(--matt);}
  .avatar{
    width:44px;height:44px;border-radius:12px;flex:0 0 auto;display:grid;place-items:center;
    font-family:"Fraunces";font-weight:600;font-size:17px;color:#fff;background:var(--ink-3);letter-spacing:-.02em;
  }
  .avatar[data-b="mybabyshoot"]{background:var(--baby);}
  .avatar[data-b="maison-lumiere"]{background:var(--lumiere);}
  .avatar[data-b="matt-la-photo"]{background:var(--matt);}
  .row-main{flex:1;min-width:0;}
  .row-main .t{font-weight:600;font-size:15px;line-height:1.25;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .row-main .s{font-size:13px;color:var(--ink-2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .row-end{flex:0 0 auto;text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:5px;}
  .chev{color:var(--ink-4);flex:0 0 auto;}
  .row-del{flex:0 0 auto;width:36px;height:36px;border-radius:10px;border:1px solid transparent;background:transparent;color:var(--ink-4);display:grid;place-items:center;cursor:pointer;transition:.15s;}
  .row-del:hover{background:var(--danger-soft);color:var(--danger);border-color:var(--danger-soft);}
  .row-del svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  .subtabs{display:flex;gap:6px;margin:14px 0 2px;}
  .subtabs button{flex:1;padding:10px;border-radius:11px;border:1px solid var(--line-2);background:var(--surface);color:var(--ink-2);font-weight:500;font-size:13.5px;cursor:pointer;transition:.15s;}
  .subtabs button.on{background:var(--lumiere);border-color:var(--lumiere);color:#fff;}
  .chev svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;}

  /* ---------- badges ---------- */
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:999px;letter-spacing:.01em;white-space:nowrap;}
  .badge.neutral{background:var(--surface-3);color:var(--ink-2);}
  .badge.ok{background:var(--ok-soft);color:var(--ok);}
  .badge.warn{background:var(--warn-soft);color:var(--warn);}
  .badge.danger{background:var(--danger-soft);color:var(--danger);}
  .badge.info{background:#eaf0f6;color:#3a5a80;}
  .badge.baby{background:var(--baby-soft);color:#b04d6e;}
  .badge.lumiere{background:var(--lumiere-soft);color:#8a6a30;}
  .badge.matt{background:var(--matt-soft);color:#c04a18;}
  .dotm{width:7px;height:7px;border-radius:50%;background:currentColor;}

  /* ---------- buttons ---------- */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:12px 18px;border-radius:12px;border:1px solid var(--ink);background:var(--fill);color:var(--fill-ink);
    font-weight:600;font-size:14.5px;cursor:pointer;transition:.15s;text-decoration:none;
  }
  .btn:hover{background:#000;}
  .btn:active{transform:scale(.985);}
  .btn.ghost{background:var(--surface);color:var(--ink);border-color:var(--line-2);}
  .btn.ghost:hover{background:var(--surface-2);border-color:var(--ink-4);}
  .btn.danger{background:var(--surface);color:var(--danger);border-color:var(--danger-soft);}
  .btn.danger:hover{background:var(--danger-soft);}
  .btn.wide{width:100%;}
  .btn svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  .btn.sm{padding:9px 13px;font-size:13.5px;border-radius:10px;}

  .fab{
    position:fixed;right:18px;bottom:calc(var(--tabh) + env(safe-area-inset-bottom) + 16px);z-index:35;
    width:56px;height:56px;border-radius:18px;background:var(--fill);color:var(--fill-ink);border:none;cursor:pointer;
    display:grid;place-items:center;box-shadow:0 8px 24px rgba(20,20,24,.28);transition:.18s;
  }
  .fab:hover{transform:translateY(-2px) rotate(90deg);}
  .fab svg{width:26px;height:26px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;}

  /* ---------- forms ---------- */
  .field{margin-bottom:15px;}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-2);margin-bottom:6px;letter-spacing:.01em;}
  .field input,.field select,.field textarea{
    width:100%;padding:12px 13px;border:1px solid var(--line-2);border-radius:11px;
    background:var(--surface);transition:.15s;font-size:15px;
  }
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--ink);box-shadow:0 0 0 3px rgba(26,26,28,.07);}
  .field textarea{min-height:88px;resize:vertical;line-height:1.5;}
  .field.two{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
  .field.two label{grid-column:1/-1;}
  .cap{font-size:11px;font-weight:600;color:var(--ink-3);margin:0 0 4px 2px;}
  .hint{font-size:12px;color:var(--ink-3);margin-top:5px;}

  .seg{display:flex;gap:6px;flex-wrap:wrap;}
  .seg button{
    flex:1 1 auto;min-width:0;padding:10px 8px;border-radius:10px;border:1px solid var(--line-2);
    background:var(--surface);color:var(--ink-2);font-weight:500;font-size:13px;cursor:pointer;transition:.15s;white-space:nowrap;
  }
  .seg button.on{background:var(--fill);color:var(--fill-ink);border-color:var(--ink);}
  .seg.brands button[data-b="mybabyshoot"].on{background:var(--baby);border-color:var(--baby);}
  .seg.brands button[data-b="maison-lumiere"].on{background:var(--lumiere);border-color:var(--lumiere);}
  .seg.brands button[data-b="matt-la-photo"].on{background:var(--matt);border-color:var(--matt);}

  /* ---------- detail sheet ---------- */
  .sheet-head{display:flex;align-items:flex-start;gap:14px;margin:18px 0 6px;}
  .sheet-head .avatar{width:56px;height:56px;border-radius:16px;font-size:22px;}
  .sheet-head h2{font-size:24px;font-weight:600;line-height:1.1;}
  .sheet-head .meta{font-size:13.5px;color:var(--ink-2);margin-top:5px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .kv{display:flex;flex-direction:column;gap:2px;padding:13px 15px;border-bottom:1px solid var(--line);}
  .kv:last-child{border-bottom:none;}
  .kv .k{font-size:12px;color:var(--ink-3);font-weight:500;}
  .kv .v{font-size:15px;font-weight:500;}
  .kv .v a{color:var(--ink);text-decoration:none;border-bottom:1px solid var(--line-2);}
  .quick-actions{display:flex;gap:8px;margin:16px 0;flex-wrap:wrap;}
  .quick-actions .btn{flex:1 1 40%;padding:11px;}

  .empty{text-align:center;padding:46px 24px;color:var(--ink-3);}
  .empty svg{width:46px;height:46px;stroke:var(--ink-4);stroke-width:1.5;fill:none;margin-bottom:14px;}
  .empty .t{font-family:"Fraunces";font-size:19px;color:var(--ink-2);font-weight:500;}
  .empty .s{font-size:14px;margin-top:6px;max-width:280px;margin-left:auto;margin-right:auto;line-height:1.5;}

  .backlink{display:inline-flex;align-items:center;gap:6px;color:var(--ink-2);font-weight:500;font-size:14px;cursor:pointer;padding:16px 2px 8px;background:none;border:none;}
  .backlink svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}

  .divider{height:1px;background:var(--line);margin:22px 0;}
  .grouplab{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);margin:22px 2px 10px;}

  .search{position:relative;margin:14px 0 4px;}
  .search input{width:100%;padding:12px 13px 12px 42px;border:1px solid var(--line-2);border-radius:13px;background:var(--surface);font-size:15px;}
  .search input:focus{outline:none;border-color:var(--ink);}
  .search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:var(--ink-3);stroke-width:2;fill:none;}

  .pill-row{display:flex;gap:7px;overflow-x:auto;margin:12px 0;scrollbar-width:none;padding-bottom:2px;}
  .pill-row::-webkit-scrollbar{display:none;}
  .pill{flex:0 0 auto;padding:7px 13px;border-radius:999px;border:1px solid var(--line-2);background:var(--surface);font-size:13px;font-weight:500;color:var(--ink-2);cursor:pointer;white-space:nowrap;transition:.15s;}
  .pill.on{background:var(--fill);color:var(--fill-ink);border-color:var(--ink);}

  /* payment bar */
  .pay-bar{height:8px;border-radius:999px;background:var(--surface-3);overflow:hidden;margin-top:9px;}
  .pay-bar > div{height:100%;background:var(--ok);border-radius:999px;transition:.4s;}

  /* ---------- tabbar ---------- */
  .tabbar{
    position:fixed;left:0;right:0;bottom:0;z-index:50;
    height:calc(var(--tabh) + env(safe-area-inset-bottom));
    padding-bottom:env(safe-area-inset-bottom);
    background:var(--tabbar-bg);backdrop-filter:saturate(160%) blur(18px);-webkit-backdrop-filter:saturate(160%) blur(18px);
    border-top:1px solid var(--line);display:flex;
  }
  .tab{
    flex:1;background:none;border:none;cursor:pointer;color:var(--ink-3);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:0;transition:.15s;position:relative;
  }
  .tab svg{width:23px;height:23px;stroke:currentColor;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  .tab span{font-size:10.5px;font-weight:500;letter-spacing:.01em;}
  .tab.on{color:var(--ink);}
  .tab.on::before{content:"";position:absolute;top:0;width:26px;height:3px;border-radius:0 0 3px 3px;background:var(--ink);}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(20,20,24,.4);z-index:60;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px);}
  .modal-bg.on{display:flex;}
  .modal{background:var(--surface);border-radius:22px 22px 0 0;width:100%;max-width:720px;max-height:88vh;overflow-y:auto;padding:8px 18px calc(28px + env(safe-area-inset-bottom));animation:slideup .3s cubic-bezier(.2,.8,.2,1);}
  @keyframes slideup{from{transform:translateY(100%);}to{transform:none;}}
  .modal-grip{width:38px;height:4px;border-radius:99px;background:var(--line-2);margin:8px auto 14px;}
  .modal h2{font-size:21px;font-weight:600;margin-bottom:16px;}
  @media(min-width:560px){.modal-bg{align-items:center;}.modal{border-radius:22px;max-height:86vh;}}

  .toast{position:fixed;left:50%;bottom:calc(var(--tabh) + env(safe-area-inset-bottom) + 20px);transform:translateX(-50%) translateY(20px);background:var(--fill);color:var(--fill-ink);padding:11px 18px;border-radius:12px;font-size:14px;font-weight:500;z-index:80;opacity:0;pointer-events:none;transition:.3s;box-shadow:0 8px 30px rgba(0,0,0,.3);}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

  .relation{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;margin-bottom:8px;cursor:pointer;transition:.15s;}
  .relation:hover{border-color:var(--line-2);}
  .relation .ri{width:34px;height:34px;border-radius:9px;background:var(--surface-3);display:grid;place-items:center;flex:0 0 auto;color:var(--ink-2);}
  .relation .ri svg{width:17px;height:17px;stroke:currentColor;stroke-width:1.9;fill:none;}

  .relation .rt .a{font-weight:600;font-size:14px;}

  .synccode{width:100%;min-height:120px;font-family:ui-monospace,monospace;font-size:12px;padding:12px;border:1px solid var(--line-2);border-radius:12px;background:var(--surface-2);resize:vertical;color:var(--ink-2);line-height:1.5;}

  /* ecran de verrouillage */
  .lock{position:fixed;inset:0;z-index:200;background:var(--bg);display:none;align-items:center;justify-content:center;padding:24px;padding-top:calc(env(safe-area-inset-top) + 24px);}
  .lock-card{width:100%;max-width:360px;text-align:center;}
  .lock-logo{width:60px;height:60px;border-radius:17px;background:var(--logo-bg);display:grid;place-items:center;margin:0 auto 18px;}
  .lock-logo svg{width:32px;height:32px;}
  .lock-card h2{font-size:30px;font-weight:600;letter-spacing:-.02em;}
  .lock-sub{font-size:14px;color:var(--ink-2);margin:8px 0 22px;line-height:1.5;}
  .lock-card input{width:100%;padding:14px 15px;border:1px solid var(--line-2);border-radius:13px;background:var(--surface);font-size:16px;margin-bottom:12px;text-align:center;}
  .lock-card input:focus{outline:none;border-color:var(--ink);box-shadow:0 0 0 3px rgba(26,26,28,.07);}
  .lock-err{font-size:13px;color:var(--danger);margin-top:12px;min-height:18px;}
  .lock-link{background:none;border:none;color:var(--ink-2);font-size:13.5px;font-weight:500;cursor:pointer;margin-top:14px;text-decoration:underline;text-underline-offset:3px;}
  .lock-link:hover{color:var(--ink);}
  .photo-tile{position:relative;aspect-ratio:1;border-radius:12px;overflow:hidden;background:var(--surface-3);cursor:pointer;border:1px solid var(--line);}
  .photo-tile img{width:100%;height:100%;object-fit:cover;display:block;}
  .photo-del{position:absolute;top:5px;right:5px;width:24px;height:24px;border-radius:7px;border:none;background:rgba(20,20,24,.62);color:#fff;display:grid;place-items:center;cursor:pointer;}
  .photo-del svg{width:14px;height:14px;stroke:currentColor;stroke-width:2.4;fill:none;stroke-linecap:round;}
  .itin{display:inline-flex;align-items:center;gap:4px;margin-left:8px;padding:3px 9px;border-radius:999px;background:var(--surface-3);color:var(--ink);font-size:12.5px;font-weight:600;text-decoration:none;white-space:nowrap;vertical-align:middle;}

</style>

<script>
/* ============================================================
   STUDIO, l'atelier de Matt
   CRM photographe - fichier unique, memes rouages que le Grimoire
   Sauvegarde locale + synchro auto via Netlify (fonction store)
   ============================================================ */

/* ---------- marques ---------- */
const BRANDS = {
  "mybabyshoot":   { name:"Mybabyshoot",    short:"Baby",    color:"var(--baby)",    badge:"baby",    tag:"Grossesse & naissance" },
  "maison-lumiere":{ name:"Maison Lumière",  short:"Lumière", color:"var(--lumiere)", badge:"lumiere", tag:"Mariage" },
  "matt-la-photo": { name:"Matt la photo",   short:"Matt",    color:"var(--matt)",    badge:"matt",    tag:"Contenu & street" }
};
const BRAND_ORDER = ["mybabyshoot","maison-lumiere","matt-la-photo"];

const CLIENT_STATUS = ["Prospect","Devis envoye","Confirme","Seance faite","Livre","Archive"];
const STATUS_STYLE = {
  "Prospect":"info","Devis envoye":"warn","Confirme":"ok","Seance faite":"neutral","Livre":"ok","Archive":"neutral"
};
const SEANCE_STATUS = ["A venir","Confirmee","Faite","Annulee"];
const SEANCE_STYLE = {"A venir":"info","Confirmee":"ok","Faite":"neutral","Annulee":"danger"};
const PAY_STATUS = ["En attente","Acompte recu","Solde"];
const PAY_STYLE = {"En attente":"warn","Acompte recu":"info","Solde":"ok"};

const TYPES = {
  "mybabyshoot":["Seance grossesse","Naissance / nouveau-ne","Famille","Smash cake","Suivi bebe"],
  "maison-lumiere":["Mariage complet","Ceremonie seule","Engagement","Elopement","Video mariage"],
  "matt-la-photo":["Collab marque","Contenu reseaux","Portrait street","Shooting perso","Prestation video"]
};

/* ---------- storage ---------- */
const KEY = "studio_matt_v1";
const THEMES=[{id:'clair',nom:'Clair',sw:'#f3f3f1'},{id:'creme',nom:'Crème',sw:'#faf4ea'},{id:'rose',nom:'Rosé',sw:'#fdf3f5'},{id:'ocean',nom:'Océan',sw:'#dcecef'},{id:'sauge',nom:'Sauge',sw:'#dfe9da'},{id:'lavande',nom:'Lavande',sw:'#e7ddf5'},{id:'sombre',nom:'Sombre',sw:'#2a2b2f'}];
function renderThemeRow(){ const row=document.getElementById("themeRow"); if(!row) return; const cur=document.documentElement.getAttribute("data-theme")||"clair"; row.innerHTML=THEMES.map(t=>'<button type="button" class="theme-btn'+(t.id===cur?' on':'')+'" onclick="applyTheme(\''+t.id+'\')"><span class="theme-sw" style="background:'+t.sw+'"></span>'+t.nom+'</button>').join(""); }
function applyTheme(id){ document.documentElement.setAttribute("data-theme",id); try{localStorage.setItem("studio_theme",id);}catch(e){} renderThemeRow(); }
try{ document.documentElement.setAttribute("data-theme", localStorage.getItem("studio_theme")||"clair"); }catch(e){}
const ENDPOINT = "/.netlify/functions/store-crm";
const CLOUD = (location.protocol==="http:"||location.protocol==="https:");
let applying=false, pushTimer=null;

let DB = { clients:[], seances:[], paiements:[], taches:[], deleted:[], v:1, t:0 };

function loadDB(){
  try{ const r=localStorage.getItem(KEY); if(r){ DB=Object.assign(DB,JSON.parse(r)); } }catch(e){}
  DB.clients = DB.clients||[]; DB.seances=DB.seances||[]; DB.paiements=DB.paiements||[]; DB.taches=DB.taches||[]; DB.deleted=DB.deleted||[];
}
function saveDB(){
  DB.t=Date.now();
  try{ localStorage.setItem(KEY,JSON.stringify(DB)); }catch(e){}
  cloudPush();
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

/* ---------- helpers ---------- */
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
function initials(name){
  if(!name) return "?";
  const p=name.trim().split(/\s+/);
  return ((p[0]?.[0]||"")+(p[1]?.[0]||"")).toUpperCase()||name[0].toUpperCase();
}
/* lecture d'un montant : accepte la virgule OU le point, ignore les espaces */
function num(v){
  if(v==null) return 0;
  const n=parseFloat(String(v).replace(/\s/g,"").replace(",","."));
  return isNaN(n)?0:n;
}
function euros(n){
  n=num(n);
  return n.toLocaleString("fr-FR",{minimumFractionDigits:0,maximumFractionDigits:2})+" \u20ac";
}
const MOIS=["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
const JOURS=["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"];
function parseDate(s){ if(!s) return null; const d=new Date(s+"T00:00:00"); return isNaN(d)?null:d; }
function fmtDate(s){ const d=parseDate(s); if(!d) return ""; return `${JOURS[d.getDay()]} ${d.getDate()} ${MOIS[d.getMonth()]}`; }
function fmtDateShort(s){ const d=parseDate(s); if(!d) return ""; return `${d.getDate()} ${MOIS[d.getMonth()].slice(0,4)}.`; }
function todayStr(){ const d=new Date(); return d.toISOString().slice(0,10); }
function daysBetween(a,b){ return Math.round((parseDate(a)-parseDate(b))/86400000); }
function isPast(s){ return s && s<todayStr(); }
function daysSince(ts){ if(!ts) return 999; return Math.floor((Date.now()-Number(ts))/86400000); }
/* prospects sans nouvelle depuis 7 jours (jamais confirmes) */
function staleProspects(){
  const SEUIL=7;
  return DB.clients.filter(c=>
    (c.status==="Prospect"||c.status==="Devis envoye") &&
    daysSince(c.relancedAt||c.createdAt) >= SEUIL
  ).sort((a,b)=> (a.relancedAt||a.createdAt||0) - (b.relancedAt||b.createdAt||0));
}
/* paiements dont l'echeance de solde est passee et non regles */
function overduePayments(){
  const t=todayStr();
  return DB.paiements.filter(p=>
    p.statut!=="Solde" && p.dueDate && p.dueDate<t && (num(p.total)-num(p.acompte))>0
  ).sort((a,b)=>(a.dueDate||"").localeCompare(b.dueDate||""));
}
function markRelance(id){
  const c=clientById(id); if(!c) return;
  c.relancedAt=Date.now(); saveDB(); buildHome(); toast("Marqué comme relancé");
}
function isToday(s){ return s===todayStr(); }
function relDay(s){
  if(!s) return "";
  const d=daysBetween(s,todayStr());
  if(d===0) return "aujourd'hui";
  if(d===1) return "demain";
  if(d===-1) return "hier";
  if(d>1&&d<7) return "dans "+d+" j";
  if(d<-1&&d>-7) return "il y a "+(-d)+" j";
  return fmtDate(s);
}

/* ---------- lookups ---------- */
function clientById(id){ return DB.clients.find(c=>c.id===id); }
function seancesOfClient(id){ return DB.seances.filter(s=>s.clientId===id); }
function paysOfClient(id){ return DB.paiements.filter(p=>p.clientId===id); }
function brandBadge(b){ const br=BRANDS[b]; return br?`<span class="badge ${br.badge}"><span class="dotm"></span>${br.name}</span>`:""; }

/* ---------- filtre marque global ---------- */
let FILTER="all";
function passFilter(b){ return FILTER==="all"||b===FILTER; }

/* ---------- navigation ---------- */
const TITLES={home:"Aujourd'hui",clients:"Clients",agenda:"Agenda",paiements:"Paiements",rappels:"Rappels",demandes:"Demandes",fiche:"Fiche client",reglages:"Réglages"};
function setView(id){
  document.querySelectorAll(".view").forEach(v=>v.classList.toggle("active",v.id===id));
  document.getElementById("topTitle").textContent=TITLES[id]||"Studio";
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on",t.dataset.view===id));
  const showFab=["home","clients","agenda","paiements","rappels","demandes"].includes(id);
  document.getElementById("fab").style.display=showFab?"grid":"none";
  window.scrollTo(0,0);
}
function goHome(){ buildHome(); setView("home"); }
function openClients(){ renderClients(); setView("clients"); }
function openAgenda(){ renderAgenda(); setView("agenda"); }
function openPaiements(){ renderPaiements(); setView("paiements"); }
function openRappels(){ renderRappels(); setView("rappels"); }
function openDemandes(){ renderDemandes(); setView("demandes"); }
function renderDemandes(){
  const box=document.getElementById("demandesBody");
  const list=DB.clients.filter(c=>c.fromSite && passFilter(c.brand)).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  document.getElementById("demandeCount").textContent=list.length||"";
  if(!list.length){
    box.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 8l9 6 9-6"/></svg><div class="t">Aucune demande</div><div class="s">Les demandes envoyees depuis tes formulaires (site Mybabyshoot, Maison Lumiere) apparaitront ici.</div></div>`;
    return;
  }
  box.innerHTML=list.map(c=>{
    const when=c.createdAt?relDay(new Date(c.createdAt).toISOString().slice(0,10)):"";
    return `<div class="row" data-b="${c.brand}" onclick="openFiche('${c.id}')">
      <div class="avatar" data-b="${c.brand}">${esc(initials(c.name))}</div>
      <div class="row-main"><div class="t">${esc(c.name)}</div><div class="s">${esc(c.source||acc(c.status)||"Demande")}${when?" . "+esc(when):""}</div></div>
      <div class="row-end">
        ${c.tel?`<a class="btn sm" style="padding:6px 10px" href="tel:${esc(c.tel.replace(/\s/g,''))}" onclick="event.stopPropagation()">Appeler</a>`:""}
        <button class="btn sm danger" style="padding:6px 10px" onclick="event.stopPropagation();deleteDemande('${c.id}')">Supprimer</button>
      </div>
    </div>`;
  }).join('');
}
function deleteDemande(id){
  const c=clientById(id); if(!c) return;
  if(!confirm("Supprimer cette demande ("+c.name+") ?")) return;
  const gone=[id]
    .concat(DB.seances.filter(s=>s.clientId===id).map(s=>s.id))
    .concat(DB.paiements.filter(p=>p.clientId===id).map(p=>p.id))
    .concat(DB.taches.filter(t=>t.clientId===id).map(t=>t.id));
  DB.deleted=(DB.deleted||[]).concat(gone);
  DB.clients=DB.clients.filter(x=>x.id!==id);
  DB.seances=DB.seances.filter(s=>s.clientId!==id);
  DB.paiements=DB.paiements.filter(p=>p.clientId!==id);
  DB.taches=DB.taches.filter(t=>t.clientId!==id);
  saveDB(); renderDemandes(); toast("Demande supprimée");
}
function openReglages(){ setView("reglages"); try{ renderReglages(); }catch(e){ console.error("renderReglages:",e); } }

function toast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("on");
  clearTimeout(t._to); t._to=setTimeout(()=>t.classList.remove("on"),2200);
}

/* ---------- modal ---------- */
function openModal(html){
  document.getElementById("modalContent").innerHTML=html;
  document.getElementById("modalBg").classList.add("on");
  document.body.style.overflow="hidden";
}
function closeModal(){

/* ============================================================
   ACCUEIL - tableau de bord "Aujourd'hui"
   ============================================================ */
function buildHome(){
  buildBrandbar();
  const body=document.getElementById("homeBody");
  const clients=DB.clients.filter(c=>passFilter(c.brand)&&c.status!=="Archive");
  const seances=DB.seances.filter(s=>passFilter(s.brand)&&s.status!=="Annulee"&&s.type!=="RDV telephonique"&&s.type!=="Indispo");
  const pays=DB.paiements.filter(p=>passFilter(p.brand));
  const taches=DB.taches.filter(t=>!t.done);

  // seances a venir
  const upcoming=seances.filter(s=>s.date>=todayStr()).sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  const todaySeances=upcoming.filter(s=>isToday(s.date));

  // argent en attente
  let due=0, encaisse=0;
  pays.forEach(p=>{ const t=num(p.total), a=num(p.acompte); if(p.statut==="Solde"){encaisse+=t;} else {encaisse+=a; due+=(t-a);} });

  // CA du mois en cours (paiements dont la date est ce mois)
  const ym=todayStr().slice(0,7);
  const caMois=pays.filter(p=>(p.date||"").slice(0,7)===ym).reduce((s,p)=>s+(p.statut==="Solde"?(num(p.total)):(num(p.acompte))),0);

  // rappels en retard / du jour
  const rappelsChauds=taches.filter(t=>t.dueDate&&t.dueDate<=todayStr()).sort((a,b)=>(a.dueDate||"").localeCompare(b.dueDate||""));

  let h="";

  // hero
  const now=new Date();
  const hello = now.getHours()<12?"Bonjour Matt":now.getHours()<18?"Bon aprem Matt":"Bonsoir Matt";
  h+=`<div style="margin:18px 2px 4px;">
    <div class="eyebrow">${JOURS[now.getDay()]} ${now.getDate()} ${MOIS[now.getMonth()]}</div>
    <h1 style="font-size:30px;font-weight:500;margin-top:4px;letter-spacing:-.02em;">${hello}.</h1>
  </div>`;

  // stats
  h+=`<div class="stat-grid">
    <div class="stat"><div class="lab">Séances à venir</div><div class="num">${upcoming.length}</div><div class="foot">${todaySeances.length? todaySeances.length+" aujourd'hui":"rien aujourd'hui"}</div></div>
    <div class="stat"><div class="lab">En attente de paiement</div><div class="num euro">${euros(due)}</div><div class="foot">${pays.filter(p=>p.statut!=="Solde").length} dossier(s)</div></div>
    <div class="stat"><div class="lab">Encaisse ce mois</div><div class="num euro">${euros(caMois)}</div><div class="foot">${MOIS[now.getMonth()]}</div></div>
    <div class="stat"><div class="lab">Clients actifs</div><div class="num">${clients.length}</div><div class="foot">${DB.clients.filter(c=>passFilter(c.brand)&&c.status==="Prospect").length} prospect(s)</div></div>
  </div>`;

  // aujourd'hui
  if(todaySeances.length){
    h+=`<div class="section-title"><h2>Le jour même</h2></div>`;
    todaySeances.forEach(s=>h+=seanceRow(s,true));
  }

  // agenda a venir (toutes marques : prochains jours et semaines)
  const futurs=upcoming.filter(s=>!isToday(s.date));
  if(futurs.length){
    h+=`<div class="section-title"><h2>À venir</h2><span class="count">${futurs.length}</span></div>`;
    futurs.slice(0,8).forEach(s=>h+=seanceRow(s));
    if(futurs.length>8) h+=`<button class="btn ghost wide sm" onclick="openAgenda()">Voir tout l'agenda</button>`;
  }

  // rappels chauds
  if(rappelsChauds.length){
    h+=`<div class="section-title"><h2>À traiter</h2><span class="count">${rappelsChauds.length}</span></div>`;
    rappelsChauds.slice(0,4).forEach(t=>h+=taskRow(t));
    if(rappelsChauds.length>4) h+=`<button class="btn ghost wide sm" onclick="openRappels()">Voir tous les rappels</button>`;
  }

  // prospects a relancer (sans nouvelle depuis 7 jours)
  const relances=staleProspects().filter(c=>passFilter(c.brand));
  if(relances.length){
    h+=`<div class="section-title"><h2>À relancer</h2><span class="count">${relances.length}</span></div>`;
    relances.slice(0,5).forEach(c=>{
      const depuis=daysSince(c.relancedAt||c.createdAt);
      h+=`<div class="row" data-b="${c.brand}" onclick="openFiche('${c.id}')">
        <div class="avatar" data-b="${c.brand}">${esc(initials(c.name))}</div>
        <div class="row-main"><div class="t">${esc(c.name)}</div><div class="s">${esc(acc(c.status))} . sans nouvelle depuis ${depuis} j</div></div>
        <div class="row-end">
          ${c.tel?`<a class="btn sm" style="padding:6px 10px" href="tel:${esc(c.tel.replace(/\s/g,''))}" onclick="event.stopPropagation()">Appeler</a>`:""}
          <button class="btn sm ghost" style="padding:6px 10px" onclick="event.stopPropagation();markRelance('${c.id}')">Relancé</button>
        </div>
      </div>`;
    });
  }

  // soldes en retard (echeance passee, pas soldes)
  const retards=overduePayments().filter(p=>passFilter(p.brand));
  if(retards.length){
    h+=`<div class="section-title"><h2>Soldes en retard</h2><span class="count">${retards.length}</span></div>`;
    retards.slice(0,5).forEach(p=>{
      const c=clientById(p.clientId);
      const reste=num(p.total)-num(p.acompte);
      h+=`<div class="row" data-b="${p.brand}" onclick="openPayEdit('${p.id}')">
        <div class="avatar" data-b="${p.brand}">${esc(initials(c?c.name:p.label||"?"))}</div>
        <div class="row-main"><div class="t">${esc(c?c.name:p.label||"Prestation")}</div><div class="s">échéance ${relDay(p.dueDate)}</div></div>
        <div class="row-end"><span class="badge danger">${euros(reste)} dû</span></div>
      </div>`;
    });
  }

  // prochains RDV telephoniques
  const appels=DB.seances.filter(s=>s.type==="RDV telephonique"&&s.status!=="Annulee"&&s.status!=="Faite"&&s.date>=todayStr()&&passFilter(s.brand))
    .sort((a,b)=>(a.date+(a.time||"")).localeCompare(b.date+(b.time||"")));
  if(appels.length){
    h+=`<div class="section-title"><h2>RDV téléphonique</h2><span class="count">${appels.length}</span></div>`;
    appels.slice(0,5).forEach(s=>{
      const c=s.clientId?clientById(s.clientId):null;
      const when=`${relDay(s.date)}${s.time?" à "+s.time.replace(":","h"):""}`;
      h+=`<div class="row" data-b="maison-lumiere" onclick="openRdv('${s.id}')">
        <div class="avatar" data-b="maison-lumiere"><svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:#fff;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round"><path d="M6.6 10.8a15 15 0 0 0 6.6 6.6l2.2-2.2a1 1 0 0 1 1-.24 11 11 0 0 0 3.4.54 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1 11 11 0 0 0 .54 3.4 1 1 0 0 1-.24 1Z"/></svg></div>
        <div class="row-main"><div class="t">${esc(c?c.name:"Contact")}</div><div class="s">${esc(s.objet||"Appel")}</div></div>
        <div class="row-end">${c&&c.tel?`<a class="btn sm" style="padding:6px 10px" href="tel:${esc(c.tel.replace(/\s/g,''))}" onclick="event.stopPropagation()">Appeler</a>`:""}<span style="font-size:12.5px;font-weight:600;color:var(--ink-2)">${esc(when)}</span></div>
      </div>`;
    });
  }

  // prochains mariages (Maison Lumiere) : seulement clients confirmes, pas les prospects
  if(passFilter("maison-lumiere")){
    const signes=["Confirme","Seance faite","Livre"];
    const mariages=DB.clients
      .filter(c=>c.brand==="maison-lumiere"&&c.eventDate&&c.eventDate>=todayStr()&&signes.includes(c.status))
      .sort((a,b)=>a.eventDate.localeCompare(b.eventDate)).slice(0,4);
    if(mariages.length){
      h+=`<div class="section-title"><h2>Prochains mariages</h2></div>`;
      mariages.forEach(c=>{
        h+=`<div class="row" data-b="maison-lumiere" onclick="openFiche('${c.id}')">
          <div class="avatar" data-b="maison-lumiere">${esc(initials(c.name))}</div>
          <div class="row-main"><div class="t">${esc(c.name)}</div><div class="s">${fmtDate(c.eventDate)}</div></div>
          <div class="row-end"><span style="font-family:'Fraunces';font-size:20px;font-weight:600;color:var(--lumiere)">${countdown(c.eventDate)}</span></div>
        </div>`;
      });
    }
  }

  if(!upcoming.length && !rappelsChauds.length && !DB.clients.length){
    h+=`<div class="empty" style="margin-top:30px;">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="6"/><circle cx="12" cy="13" r="2.4"/><path d="M5 8h3l1.4-2h5.2L16 8h3"/></svg>
      <div class="t">Ton atelier est prêt</div>
      <div class="s">Ajoute ton premier client avec le bouton plus en bas a droite. Fiches, séances, paiements et rappels vivront ici.</div>
    </div>`;
  } else if(!upcoming.length && !rappelsChauds.length){
    h+=`<div class="empty" style="margin-top:24px;">
      <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5v14"/></svg>
      <div class="t">Rien de chaud pour l'instant</div>
      <div class="s">Aucune séance ni rappel a venir. Profite, ou planifie la suite.</div>
    </div>`;
  }

  body.innerHTML=h;
}

/* ---------- fabrique de lignes reutilisables ---------- */
function seanceRow(s,big){
  const c=clientById(s.clientId);
  const name=c?c.name:"Sans client";
  const time=s.time?s.time.replace(":","h"):"";
  const when=big?time:`${relDay(s.date)}${time?" \u00b7 "+time:""}`;
  return `<div class="row" data-b="${s.brand}" onclick="openSeance('${s.id}')">
    <div class="avatar" data-b="${s.brand}">${esc(initials(name))}</div>
    <div class="row-main">
      <div class="t">${esc(name)}</div>
      <div class="s">${esc(acc(s.type)||BRANDS[s.brand]?.tag||"")}${s.place?" \u00b7 "+esc(s.place):""}</div>
    </div>
    <div class="row-end">
      <span class="badge ${SEANCE_STYLE[s.status]||"neutral"}">${esc(acc(s.status))}</span>
      <span style="font-size:12.5px;color:var(--ink-2);font-weight:600">${esc(when)}</span>
    </div>
  </div>`;
}
function taskRow(t){
  const c=t.clientId?clientById(t.clientId):null;
  const late=t.dueDate&&isPast(t.dueDate);
  return `<div class="row" onclick="openTask('${t.id}')" style="cursor:pointer">
    <div class="avatar" style="background:${late?"var(--danger)":"var(--ink-3)"}">
      <svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:#fff;stroke-width:2;fill:none"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/></svg>
    </div>
    <div class="row-main">
      <div class="t">${esc(t.title)}</div>
      <div class="s">${c?esc(c.name)+" \u00b7 ":""}${t.dueDate?relDay(t.dueDate):"sans échéance"}</div>
    </div>
    <div class="row-end">
      ${late?'<span class="badge danger">en retard</span>':(t.dueDate&&isToday(t.dueDate)?'<span class="badge warn">aujourd\'hui</span>':'')}
      <button class="btn sm ghost" style="padding:6px 10px" onclick="event.stopPropagation();completeTask('${t.id}')">Fait</button>
    </div>
  </div>`;
}

/* ============================================================
   CLIENTS
   ============================================================ */
let clientStatusFilter="all";
let clientBrand="all";   // categorie de marque propre a la vue Clients
let contactsBrand="all"; // filtre marque de la carte Contacts & campagnes
let mlView="clients";    // sous-vue Maison Lumiere : clients | rdv

/* libelle de la date d'evenement selon la marque */
function eventLabel(brand){
  if(brand==="maison-lumiere") return "Date du mariage";
  if(brand==="mybabyshoot") return "Date prévue (naissance)";
  return "Date de l'événement";
}
function inspirationLabel(brand){
  if(brand==="maison-lumiere") return "Inspiration souhaitée par les mariés";
  if(brand==="mybabyshoot") return "Inspiration souhaitée par les parents";
  return "Inspiration souhaitée";
}

/* affichage accentue des statuts et types (les valeurs stockees restent inchangees) */
const ACCENTS={
  "Devis envoye":"Devis envoyé","Confirme":"Confirmé","Seance faite":"Séance faite","Livre":"Livré","Archive":"Archivé",
  "A venir":"À venir","Confirmee":"Confirmée","Annulee":"Annulée",
  "Acompte recu":"Acompte reçu","Solde":"Soldé",
  "RDV telephonique":"RDV téléphonique",
  "Seance grossesse":"Séance grossesse","Naissance / nouveau-ne":"Naissance / nouveau-né","Suivi bebe":"Suivi bébé",
  "Ceremonie seule":"Cérémonie seule","Video mariage":"Vidéo mariage","Prestation video":"Prestation vidéo","Contenu reseaux":"Contenu réseaux"
};
function acc(v){ return v ? (ACCENTS[v]||v) : v; }

/* compte a rebours joli : "J-45", "aujourd'hui", "passe" */
function countdown(dateStr){
  if(!dateStr) return "";
  const d=daysBetween(dateStr,todayStr());
  if(d===0) return "aujourd'hui";
  if(d>0) return "J-"+d;
  return "il y a "+(-d)+" j";
}

function renderClients(){
  // onglets de marque (les 3 categories)
  const tabs=document.getElementById("clientBrandTabs");
  let th=`<button class="bchip ${clientBrand==="all"?"on":""}" onclick="setClientBrand('all')"><span class="d"></span>Tous</button>`;
  BRAND_ORDER.forEach(b=>{
    th+=`<button class="bchip ${clientBrand===b?"on":""}" data-b="${b}" onclick="setClientBrand('${b}')"><span class="d"></span>${BRANDS[b].name}</button>`;
  });
  tabs.innerHTML=th;

  // sous-rubrique Maison Lumiere : Clients / RDV telephonique
  const subWrap=document.getElementById("mlSubtabs");
  if(clientBrand==="maison-lumiere"){
    const nbRdv=DB.seances.filter(s=>s.type==="RDV telephonique").length;
    subWrap.style.display="flex";
    subWrap.innerHTML=`
      <button class="${mlView==='clients'?'on':''}" onclick="setMlView('clients')">Fiches clients</button>
      <button class="${mlView==='rdv'?'on':''}" onclick="setMlView('rdv')">RDV téléphonique${nbRdv?" ("+nbRdv+")":""}</button>`;
  } else {
    subWrap.style.display="none";
  }

  // vue RDV telephonique (rubrique dediee)
  if(clientBrand==="maison-lumiere" && mlView==="rdv"){
    renderRdvList();
    return;
  }

  // pills statut
  const pills=document.getElementById("clientStatusPills");
  pills.style.display="flex";
  let ph=`<button class="pill ${clientStatusFilter==="all"?"on":""}" onclick="setClientStatus('all')">Tous</button>`;
  CLIENT_STATUS.forEach(s=>{ ph+=`<button class="pill ${clientStatusFilter===s?"on":""}" onclick="setClientStatus('${s}')">${acc(s)}</button>`; });
  pills.innerHTML=ph;

  // titre = nom de la categorie active
  const titleEl=document.querySelector("#clients .section-title h2");
  if(titleEl) titleEl.textContent = clientBrand==="all"?"Clients":("Clients "+BRANDS[clientBrand].name);

  const q=(document.getElementById("clientSearch").value||"").toLowerCase().trim();
  let list=DB.clients.filter(c=>clientBrand==="all"||c.brand===clientBrand);
  if(clientStatusFilter!=="all") list=list.filter(c=>c.status===clientStatusFilter);
  if(q) list=list.filter(c=>{
    const blob=[c.name,c.tel,c.email,c.insta,c.notes,c.type].join(" ").toLowerCase();
    return blob.includes(q);
  });

  // tri : mariages tries par date d'evenement, sinon par nom
  if(clientBrand==="maison-lumiere"){
    list.sort((a,b)=>{
      const ea=a.eventDate||"9999", eb=b.eventDate||"9999";
      if(ea!==eb) return ea.localeCompare(eb);
      return a.name.localeCompare(b.name,"fr");
    });
  } else {
    list.sort((a,b)=>a.name.localeCompare(b.name,"fr"));
  }

  document.getElementById("clientCount").textContent=list.length+(list.length>1?" fiches":" fiche");
  const box=document.getElementById("clientsList");
  if(!list.length){
    box.innerHTML=`<div class="empty">
      <svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 20c.7-3.2 3-5 5.5-5s4.8 1.8 5.5 5"/></svg>
      <div class="t">${DB.clients.length?"Aucun client ici":"Pas encore de client"}</div>
      <div class="s">${DB.clients.length?"Change de categorie, de filtre, ou vide la recherche.":"Touche le plus en bas à droite pour créer ta première fiche."}</div>
    </div>`;
    return;
  }
  box.innerHTML=list.map(c=>{
    let sub, end;
    if(c.brand==="maison-lumiere" && c.eventDate){
      // pour les mariages : on montre la date du mariage
      sub=`Mariage ${fmtDate(c.eventDate)}`;
      const cd=countdown(c.eventDate);
      end=`<span style="font-size:12.5px;font-weight:700;color:${isPast(c.eventDate)?"var(--ink-4)":"var(--lumiere)"}">${cd}</span>`;
    } else {
      const seances=seancesOfClient(c.id).filter(s=>s.type!=="RDV telephonique");
      const nextS=seances.filter(s=>s.date>=todayStr()&&s.status!=="Annulee").sort((a,b)=>a.date.localeCompare(b.date))[0];
      sub=nextS?`Seance ${relDay(nextS.date)}`:(acc(c.type)||BRANDS[c.brand]?.tag||"");
      end="";
    }
    return `<div class="row" data-b="${c.brand}" onclick="openFiche('${c.id}')">
      <div class="avatar" data-b="${c.brand}">${esc(initials(c.name))}</div>
      <div class="row-main">
        <div class="t">${esc(c.name)}</div>
        <div class="s">${esc(sub)}</div>
      </div>
      <div class="row-end">
        <span class="badge ${STATUS_STYLE[c.status]||"neutral"}">${esc(acc(c.status))}</span>
        ${end}
      </div>
      <button class="row-del" onclick="event.stopPropagation();deleteClient('${c.id}')" aria-label="Supprimer ${esc(c.name)}">
        <svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      </button>
    </div>`;
  }).join("");
}

/* liste des RDV telephoniques (rubrique Maison Lumiere) */
function renderRdvList(){
  document.getElementById("clientStatusPills").style.display="none";
  const titleEl=document.querySelector("#clients .section-title h2");
  if(titleEl) titleEl.textContent="RDV telephonique";
  const q=(document.getElementById("clientSearch").value||"").toLowerCase().trim();
  let list=DB.seances.filter(s=>s.type==="RDV telephonique");
  if(q) list=list.filter(s=>{
    const c=clientById(s.clientId)||{};
    return [c.name,c.tel,c.email,s.notes].join(" ").toLowerCase().includes(q);
  });
  list.sort((a,b)=>(a.date+ (a.time||"")).localeCompare(b.date+(b.time||"")));
  const upcoming=list.filter(s=>s.date>=todayStr());
  const past=list.filter(s=>s.date<todayStr()).reverse();

  document.getElementById("clientCount").textContent=upcoming.length+" a venir";
  const box=document.getElementById("clientsList");
  if(!list.length){
    box.innerHTML=`<div class="empty">
      <svg viewBox="0 0 24 24"><path d="M6.6 10.8a15 15 0 0 0 6.6 6.6l2.2-2.2a1 1 0 0 1 1-.24 11 11 0 0 0 3.4.54 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1 11 11 0 0 0 .54 3.4 1 1 0 0 1-.24 1Z"/></svg>
      <div class="t">Aucun RDV telephonique</div>
      <div class="s">Les demandes d'appel faites depuis le site Maison Lumiere arriveront ici automatiquement.</div>
    </div>`;
    return;
  }
  const rowRdv=s=>{
    const c=clientById(s.clientId);
    const name=c?c.name:"Contact";
    const when=`${relDay(s.date)}${s.time?" a "+s.time.replace(":","h"):""}`;
    return `<div class="row" data-b="maison-lumiere" onclick="openRdv('${s.id}')">
      <div class="avatar" data-b="maison-lumiere"><svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:#fff;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round"><path d="M6.6 10.8a15 15 0 0 0 6.6 6.6l2.2-2.2a1 1 0 0 1 1-.24 11 11 0 0 0 3.4.54 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1 11 11 0 0 0 .54 3.4 1 1 0 0 1-.24 1Z"/></svg></div>
      <div class="row-main"><div class="t">${esc(name)}</div><div class="s">${esc(s.objet||"Appel")}</div></div>
      <div class="row-end"><span class="badge ${SEANCE_STYLE[s.status]||"info"}">${esc(acc(s.status))}</span><span style="font-size:12.5px;font-weight:600;color:var(--ink-2)">${esc(when)}</span></div>
    </div>`;
  };
  let h="";
  if(upcoming.length){ h+=`<div class="grouplab">A venir</div>`; upcoming.forEach(s=>h+=rowRdv(s)); }
  if(past.length){ h+=`<div class="grouplab">Passes</div>`; past.forEach(s=>h+=rowRdv(s)); }
  box.innerHTML=h;
}
function openRdv(id){
  const s=DB.seances.find(x=>x.id===id); if(!s) return;
  const c=s.clientId?clientById(s.clientId):null;

/* ============================================================
   PHOTOS D'INSPIRATION (stockage separe via crm-media)
   ============================================================ */
const MEDIA_ENDPOINT="/.netlify/functions/crm-media";
const photoCache={}; // id -> objectURL

function loadFichePhotos(){
  document.querySelectorAll("#photoGrid img[data-photo]").forEach(img=>{
    const id=img.getAttribute("data-photo");
    if(photoCache[id]){ img.src=photoCache[id]; return; }
    fetch(MEDIA_ENDPOINT+"?id="+encodeURIComponent(id),{headers: CRM_KEY?{"X-CRM-Key":CRM_KEY}:{},cache:"no-store"})
      .then(r=>r.ok?r.blob():null)
      .then(b=>{ if(b){ const u=URL.createObjectURL(b); photoCache[id]=u; img.src=u; } })
      .catch(()=>{});
  });
}

/* compresse une image (max 1400px, JPEG) pour un stockage leger */
function compressImage(file){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      const max=1400;
      let w=img.width,h=img.height;
      if(w>max||h>max){ if(w>=h){ h=Math.round(h*max/w); w=max; } else { w=Math.round(w*max/h); h=max; } }
      const canvas=document.createElement("canvas");
      canvas.width=w; canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      canvas.toBlob(b=>{ b?resolve(b):reject(); },"image/jpeg",0.82);
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); reject(); };
    img.src=url;
  });
}

async function onPhotoPicked(clientId,input){
  const files=Array.from(input.files||[]);
  input.value="";
  if(!files.length) return;
  if(!CLOUD){ toast("Disponible seulement en ligne"); return; }
  const msg=document.getElementById("photoMsg");
  const c=clientById(clientId); if(!c) return;
  if(!Array.isArray(c.photos)) c.photos=[];
  let done=0;
  for(const f of files){
    if(!f.type.startsWith("image/")) continue;
    if(msg) msg.textContent="Envoi des photos ("+(done+1)+"/"+files.length+")...";
    try{
      const blob=await compressImage(f);
      const id="img_"+uid();
      const res=await fetch(MEDIA_ENDPOINT+"?id="+encodeURIComponent(id),{
        method:"PUT",
        headers: Object.assign({"Content-Type":"image/jpeg"}, CRM_KEY?{"X-CRM-Key":CRM_KEY}:{}),
        body: blob
      });
      if(res.ok){ c.photos.push({id,name:f.name||"inspiration"}); photoCache[id]=URL.createObjectURL(blob); done++; }
    }catch(e){}
  }
  saveDB();
  if(msg) msg.textContent = done?(done+" photo"+(done>1?"s":"")+" ajoutée"+(done>1?"s":"")):"Aucune photo ajoutée";
  openFiche(clientId);
}

function removePhoto(clientId,photoId){
  if(!confirm("Retirer cette photo ?")) return;
  const c=clientById(clientId); if(!c||!Array.isArray(c.photos)) return;
  c.photos=c.photos.filter(p=>p.id!==photoId);
  saveDB();
  fetch(MEDIA_ENDPOINT+"?id="+encodeURIComponent(photoId),{method:"DELETE",headers: CRM_KEY?{"X-CRM-Key":CRM_KEY}:{}}).catch(()=>{});
  if(photoCache[photoId]){ URL.revokeObjectURL(photoCache[photoId]); delete photoCache[photoId]; }
  openFiche(clientId);
}

function viewPhoto(photoId){
  const src=photoCache[photoId];
  const inner = src
    ? `<img src="${src}" style="width:100%;border-radius:14px;display:block">`
    : `<div style="padding:40px;text-align:center;color:var(--ink-3)">Chargement...</div>`;
  openModal(`<div style="margin-top:4px">${inner}</div>`);
  if(!src){
    fetch(MEDIA_ENDPOINT+"?id="+encodeURIComponent(photoId),{headers: CRM_KEY?{"X-CRM-Key":CRM_KEY}:{},cache:"no-store"})
      .then(r=>r.ok?r.blob():null).then(b=>{ if(b){ const u=URL.createObjectURL(b); photoCache[photoId]=u; document.getElementById("modalContent").innerHTML=`<div style="margin-top:4px"><img src="${u}" style="width:100%;border-radius:14px;display:block"></div>`; } }).catch(()=>{});
  }
}
function kv(k,v){ return `<div class="kv"><div class="k">${k}</div><div class="v">${v}</div></div>`; }
/* lien itineraire Google Maps vers une adresse */
function mapsLink(addr){
  if(!addr) return "";
  const u="https://www.google.com/maps/dir/?api=1&destination="+encodeURIComponent(addr);
  return ` <a href="${u}" target="_blank" rel="noopener" class="itin"><svg viewBox="0 0 24 24"><path d="M12 21s7-6.3 7-11a7 7 0 1 0-14 0c0 4.7 7 11 7 11Z"/><circle cx="12" cy="10" r="2.4"/></svg>Y aller</a>`;
}
/* valeur avec lien itineraire */
function kvAddr(k,addr){ return `<div class="kv"><div class="k">${k}</div><div class="v">${esc(addr)}${mapsLink(addr)}</div></div>`; }
function fmtHeure(t){ return t?esc(String(t)).replace(":","h"):""; }
/* ligne adresse + heure d'arrivee (logistique mariage) */
function kvAddrTime(k,addr,time){
  if(!addr&&!time) return "";
  const parts=[];
  if(addr) parts.push(esc(addr)+mapsLink(addr));
  if(time) parts.push(`<span style="color:var(--ink-2);font-size:13px">Arrivée ${fmtHeure(time)}</span>`);
  return `<div class="kv"><div class="k">${k}</div><div class="v">${parts.join("<br>")}</div></div>`;
}
function kvHeure(k,t){ return t?`<div class="kv"><div class="k">${k}</div><div class="v">${fmtHeure(t)}</div></div>`:""; }
/* true si au moins une info logistique est renseignee (compat ancien format) */
function hasLogistics(L){
  if(!L) return false;
  return ["domaineAddr","domaineTime","prepaAddr","prepaTime","mairieAddr","mairieTime","egliseAddr","egliseTime","laicAddr","laicTime","revealTime","vinTime","pieceTime","mairie","ceremonie","domaine"]
    .some(k=>L[k]);
}
/* rendu des lignes de logistique jour J */
function logisticsHtml(L){
  if(!L) return "";
  const dA=L.domaineAddr!=null?L.domaineAddr:L.domaine;
  const mA=L.mairieAddr!=null?L.mairieAddr:L.mairie;
  const eA=L.egliseAddr!=null?L.egliseAddr:L.ceremonie;
  let r="";
  r+=kvAddrTime("Domaine",dA,L.domaineTime);
  r+=kvAddrTime("Préparatifs",L.prepaAddr,L.prepaTime);
  r+=kvAddrTime("Mairie",mA,L.mairieTime);
  r+=kvAddrTime("Cérémonie église",eA,L.egliseTime);
  r+=kvAddrTime("Cérémonie laïque",L.laicAddr,L.laicTime);
  r+=kvHeure("Reveal",L.revealTime);
  r+=kvHeure("Vin d'honneur",L.vinTime);
  r+=kvHeure("Pièce montée",L.pieceTime);
  return r;
}

/* lien "Ajouter a Google Agenda" (evenement pre-rempli) */
function gcalLink(opts){
  const {title,dateISO,time,durationMin,location,details}=opts;
  if(!dateISO) return "";
  let dates;
  if(time){
    const start=dateISO.replace(/-/g,"")+"T"+time.replace(":","")+"00";
    const d=parseDate(dateISO); d.setHours(parseInt(time.slice(0,2)||"0"),parseInt(time.slice(3,5)||"0"));
    const end=new Date(d.getTime()+(durationMin||120)*60000);
    const pad=n=>String(n).padStart(2,"0");
    const endStr=end.getFullYear()+pad(end.getMonth()+1)+pad(end.getDate())+"T"+pad(end.getHours())+pad(end.getMinutes())+"00";
    dates=start+"/"+endStr;
  } else {
    const d=parseDate(dateISO); const next=new Date(d.getTime()+86400000);
    const pad=n=>String(n).padStart(2,"0");
    const ymd=x=>x.getFullYear()+pad(x.getMonth()+1)+pad(x.getDate());
    dates=ymd(d)+"/"+ymd(next);
  }
  const u="https://calendar.google.com/calendar/render?action=TEMPLATE"
    +"&text="+encodeURIComponent(title||"Rendez-vous")
    +"&dates="+dates
    +(location?"&location="+encodeURIComponent(location):"")
    +(details?"&details="+encodeURIComponent(details):"");
  return u;
}
function gcalButton(opts,label){
  const u=gcalLink(opts); if(!u) return "";
  return `<a href="${u}" target="_blank" rel="noopener" class="btn ghost sm wide" style="margin-bottom:4px">
    <svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9h16M9 3v4M15 3v4"/><path d="M12 12v4M10 14h4"/></svg>${label||"Ajouter a Google Agenda"}</a>`;
}

/* place la date du mariage dans l'agenda (cree une seance de type Mariage) */
function addWeddingToAgenda(id){
  const c=clientById(id); if(!c||!c.eventDate) return;
  if(DB.seances.some(s=>s.clientId===id&&s.type==="Mariage"&&s.date===c.eventDate)){ toast("Déjà dans l'agenda"); openFiche(id); return; }
  DB.seances.push({
    id:uid(), clientId:id, brand:"maison-lumiere", type:"Mariage",
    date:c.eventDate, time:"", place:"", status:"A venir",
    notes:"Jour du mariage", createdAt:Date.now()
  });
  saveDB(); openFiche(id); toast("Mariage ajouté à l'agenda");
}

function deleteClient(id){
  const c=clientById(id);
  if(!confirm(`Supprimer ${c.name} ? Ses seances et paiements lies seront aussi effaces.`)) return;
  const gone=[id]
    .concat(DB.seances.filter(s=>s.clientId===id).map(s=>s.id))
    .concat(DB.paiements.filter(p=>p.clientId===id).map(p=>p.id))
    .concat(DB.taches.filter(t=>t.clientId===id).map(t=>t.id));
  DB.deleted=(DB.deleted||[]).concat(gone);
  DB.clients=DB.clients.filter(x=>x.id!==id);
  DB.seances=DB.seances.filter(s=>s.clientId!==id);
  DB.paiements=DB.paiements.filter(p=>p.clientId!==id);
  DB.taches=DB.taches.filter(t=>t.clientId!==id);
  saveDB(); closeModal(); openClients(); toast("Client supprimé");
}

/* Deplacer une reservation Mybabyshoot vers un autre creneau fixe (anti-doublon). */
function openMove(id){
  const s=DB.seances.find(x=>x.id===id); if(!s) return;
  const c=s.clientId?clientById(s.clientId):null;
  const slots=["10:30","14:30","18:00"];
  let h=`<h2>Déplacer le créneau</h2>
    <p class="hint" style="margin:0 0 12px">${esc(acc(s.type)||"Séance")}${c?" . "+esc(c.name):""}. La disponibilité en ligne se met à jour toute seule.</p>
    <div class="field"><label>Nouvelle date</label><input id="mvDate" type="date" value="${s.date}"></div>
    <div class="field"><label>Nouveau créneau</label><select id="mvSlot">${slots.map(t=>`<option value="${t}" ${(s.time||"")===t?"selected":""}>${t.replace(":","h")}</option>`).join("")}</select></div>
    <button class="btn wide" onclick="saveMove('${id}')">Déplacer</button>`;
  openModal(h);
}
function mbsSlotBusy(exceptId,date,time){
  return DB.seances.some(x=>x.id!==exceptId && x.brand==="mybabyshoot" && x.status!=="Annulee" &&
    (x.type==="Indispo"
      ? ((x.dateEnd?(date>=x.date&&date<=x.dateEnd):date===x.date) && (!x.time||x.time===time))
      : (x.date===date && x.time===time)));
}
function saveMove(id){
  const s=DB.seances.find(x=>x.id===id); if(!s) return;
  const date=document.getElementById("mvDate").value;
  const time=document.getElementById("mvSlot").value;
  if(!date){ toast("Choisis une date"); return; }
  if(mbsSlotBusy(id,date,time)){ toast("Ce créneau est déjà pris ou bloqué. Choisis-en un autre."); return; }
  s.date=date; s.time=time; saveDB(); closeModal(); openSeance(id); toast("Créneau déplacé");
}
async function sendFinalInvoice(id){
  const s=DB.seances.find(x=>x.id===id); if(!s) return;
  const c=s.clientId?clientById(s.clientId):null;
  if(!c||!c.email){ toast("Ce client n'a pas d'email"); return; }
  const p=DB.paiements.filter(x=>x.clientId===s.clientId&&x.brand==="mybabyshoot").sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))[0];
  const total=p?num(p.total):0, acompte=p?num(p.acompte):0;
  if(!total){ toast("Aucun montant trouve pour cette seance"); return; }
  if(!confirm("Envoyer la facture de solde a "+c.name+" ? (solde de "+euros(total-acompte)+")")) return;
  toast("Envoi de la facture...");
  try{
    const r=await fetch("/.netlify/functions/mbs-invoice-final",{method:"POST",headers:apiHeaders(true),body:JSON.stringify({
      client:{name:c.name,email:c.email}, typeLabel:s.type||"Seance",
      seanceDateFr:(s.date||"").split("-").reverse().join("/"), total, acompte
    })});
    const j=await r.json().catch(()=>null);
    if(j&&j.ok){ if(p){ p.statut="Solde"; saveDB(); } toast("Facture de solde envoyee ("+j.number+")"); openSeance(id); }
    else { toast("Echec de l'envoi de la facture"); }
  }catch(e){ toast("Erreur reseau"); }
}

  let list=DB.seances.filter(s=>passFilter(s.brand)&&s.type!=="Indispo");
  const t=todayStr();
  if(agendaFilter==="upcoming") list=list.filter(s=>s.date>=t&&s.status!=="Annulee");
  else if(agendaFilter==="today") list=list.filter(s=>s.date===t);
  else if(agendaFilter==="week") list=list.filter(s=>s.date>=t&&s.date<=addDays(t,7));
  else if(agendaFilter==="past") list=list.filter(s=>s.date<t);

  const asc=(agendaFilter==="past");
  list.sort((a,b)=>{ const r=(a.date+a.time).localeCompare(b.date+b.time); return asc?-r:r; });

  const box=document.getElementById("agendaBody");
  if(!list.length){
    box.innerHTML=`<div class="empty">
      <svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9h16M9 3v4M15 3v4"/></svg>
      <div class="t">Agenda vide</div>
      <div class="s">Aucune séance dans ce filtre. Crée une séance depuis une fiche client ou le bouton plus.</div>
    </div>`;
    return;
  }
  // groupage par date
  let h="",lastDate=null;
  list.forEach(s=>{
    if(s.date!==lastDate){
      lastDate=s.date;
      const lab=isToday(s.date)?"Aujourd'hui":(s.date===addDays(t,1)?"Demain":fmtDate(s.date));
      h+=`<div class="grouplab">${lab}</div>`;
    }
    h+=seanceRow(s);
  });
  box.innerHTML=h;
}
function setAgenda(k){ agendaFilter=k; renderAgenda(); }
function addDays(s,n){ const d=parseDate(s); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }

let payFilter="all";

  document.getElementById("payStats").innerHTML=`
    <div class="stat"><div class="lab">Encaisse</div><div class="num euro">${euros(recu)}</div><div class="foot">sur ${euros(total)} facture</div></div>
    <div class="stat"><div class="lab">Reste à encaisser</div><div class="num euro">${euros(du)}</div><div class="foot">${pays.filter(p=>p.statut!=="Solde").length} en cours</div></div>`;

      <div class="s">Ajoute un devis ou un acompte depuis une fiche client, ou avec le bouton plus.</div>
    </div>`;

  box.innerHTML=list.map(p=>{
    const c=clientById(p.clientId);
    const t=num(p.total),a=p.statut==="Solde"?t:(num(p.acompte));

function renderRappels(){
  const list=DB.taches.filter(t=>!t.clientId||passFilter((clientById(t.clientId)||{}).brand)||FILTER==="all");
  const open=list.filter(t=>!t.done).sort((a,b)=>(a.dueDate||"9999").localeCompare(b.dueDate||"9999"));
  const done=list.filter(t=>t.done).sort((a,b)=>(b.dueDate||"").localeCompare(a.dueDate||""));
  document.getElementById("taskCount").textContent=open.length+" a faire";
  const box=document.getElementById("taskList");
  let h="";
  if(!open.length&&!done.length){
    box.innerHTML=`<div class="empty">
      <svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
      <div class="t">Aucun rappel</div>
      <div class="s">Note ici ce qu'il ne faut pas oublier : relancer un devis, livrer une galerie, poster un contenu.</div>
    </div>`;
    return;
  }
  const late=open.filter(t=>t.dueDate&&isPast(t.dueDate));
  const rest=open.filter(t=>!(t.dueDate&&isPast(t.dueDate)));
  if(late.length){ h+=`<div class="grouplab" style="color:var(--danger)">En retard</div>`; late.forEach(t=>h+=taskRow(t)); }
  if(rest.length){ h+=`<div class="grouplab">A venir</div>`; rest.forEach(t=>h+=taskRow(t)); }
  if(done.length){ h+=`<div class="grouplab">Termines</div>`; done.slice(0,20).forEach(t=>{
    const c=t.clientId?clientById(t.clientId):null;
    h+=`<div class="row" style="opacity:.55" onclick="openTask('${t.id}')">
      <div class="avatar" style="background:var(--ok)"><svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:#fff;stroke-width:2.4;fill:none"><path d="M5 13l4 4L19 7"/></svg></div>
      <div class="row-main"><div class="t" style="text-decoration:line-through">${esc(t.title)}</div><div class="s">${c?esc(c.name):"termine"}</div></div>
    </div>`;
  }); }
  box.innerHTML=h;
}
function openTaskEdit(id,clientId){
  const t=id?DB.taches.find(x=>x.id===id):null;
  let h=`<h2>${t?"Modifier le rappel":"Nouveau rappel"}</h2>
    <div class="field"><label>Quoi *</label><input id="tTitle" value="${t?esc(t.title):""}" placeholder="Relancer le devis, livrer la galerie..."></div>
    <div class="field two"><label>Échéance & priorite</label>
      <input id="tDue" type="date" value="${t?(t.dueDate||""):""}">

function saveTask(id){
  const title=document.getElementById("tTitle").value.trim();
  if(!title){ toast("Écris ce qu'il faut faire"); return; }
  const data={ title, dueDate:document.getElementById("tDue").value, priority:document.getElementById("tPrio").value,
    clientId:document.getElementById("tClient").value, notes:document.getElementById("tNotes").value.trim() };
  const t=id?DB.taches.find(x=>x.id===id):null;
  if(t){ Object.assign(t,data); } else { DB.taches.push(Object.assign({id:uid(),done:false},data)); }
  saveDB(); closeModal(); openRappels(); toast(t?"Rappel mis à jour":"Rappel ajouté");
}
function openTask(id){
  const t=DB.taches.find(x=>x.id===id); if(!t) return;
  const c=t.clientId?clientById(t.clientId):null;
  let h=`<h2>${esc(t.title)}</h2><div class="card">`;
  if(t.dueDate) h+=kv("Échéance",fmtDate(t.dueDate)+(isPast(t.dueDate)&&!t.done?" (en retard)":""));
  h+=kv("Priorité",esc(t.priority||"Normale"));
  if(c) h+=kv("Client",`<a onclick="closeModal();openFiche('${c.id}')" style="cursor:pointer">${esc(c.name)}</a>`);
  if(t.notes) h+=kv("Détails",esc(t.notes).replace(/\n/g,"<br>"));
  h+=`</div><div style="display:flex;gap:9px;margin-top:16px">
    <button class="btn" style="flex:1" onclick="completeTask('${id}')">${t.done?"Rouvrir":"Marquer fait"}</button>
    <button class="btn ghost" style="flex:1" onclick="openTaskEdit('${id}')">Modifier</button></div>`;
  openModal(h);
}
function completeTask(id){
  const t=DB.taches.find(x=>x.id===id); if(!t) return;
  t.done=!t.done; saveDB(); closeModal();
  const active=document.querySelector(".view.active").id;
  if(active==="home") buildHome(); else if(active==="rappels") renderRappels(); else if(active==="fiche") { /* noop */ }
  toast(t.done?"Bien joué":"Rappel rouvert");
}
function deleteTask(id){
  DB.deleted=(DB.deleted||[]).concat([id]);
  DB.taches=DB.taches.filter(x=>x.id!==id); saveDB(); closeModal(); openRappels(); toast("Rappel supprimé");
}

/* ============================================================
   BLOCAGE DE CRENEAUX Mybabyshoot (indispos : mariage, vacances...)
   Un blocage est une seance brand "mybabyshoot" type "Indispo",
   pris en compte par la reservation en ligne (mbs-availability).
   ============================================================ */
function mbsBlocks(){
  return DB.seances.filter(s=>s.brand==="mybabyshoot"&&s.type==="Indispo"&&s.status!=="Annulee")
    .sort((a,b)=>(a.date||"").localeCompare(b.date||""));
}
function blockLabel(s){
  const slot=s.time?("à "+s.time.replace(":","h")):"toute la journée";
  const per=(s.dateEnd&&s.dateEnd!==s.date)?(" au "+fmtDate(s.dateEnd)):"";
  return fmtDate(s.date)+per+" · "+slot;
}
function openBlocksList(){
  const list=mbsBlocks();
  let h=`<h2>Créneaux bloqués</h2>
    <p class="hint" style="margin:0 0 12px">Ces dates ne seront pas proposées à la réservation en ligne Mybabyshoot.</p>
    <button class="btn wide" onclick="openBlockEdit(null)">+ Bloquer une date ou un créneau</button>`;
  if(!list.length){
    h+=`<div class="empty" style="margin-top:16px"><div class="s">Aucun blocage pour l'instant.</div></div>`;
  }else{
    h+=`<div style="margin-top:14px;display:flex;flex-direction:column;gap:8px">`;
    list.forEach(s=>{
      h+=`<div class="row" onclick="openBlockEdit('${s.id}')">
        <div class="row-main"><div class="t">${esc(blockLabel(s))}</div>${s.notes?`<div class="s">${esc(s.notes)}</div>`:""}</div>
        <div class="row-end"><button class="btn sm danger" onclick="event.stopPropagation();deleteBlock('${s.id}')">Retirer</button></div>
      </div>`;
    });
    h+=`</div>`;
  }
  openModal(h);
}
function openBlockEdit(id){
  const s=id?DB.seances.find(x=>x.id===id):null;
  const slots=["","10:30","14:30","18:00"];
  let h=`<h2>${s?"Modifier le blocage":"Bloquer une date"}</h2>
    <div class="field"><label>Date (ou début de période)</label><input id="blkDate" type="date" value="${s?s.date:todayStr()}"></div>
    <div class="field"><label>Jusqu'au (optionnel, pour une période / des vacances)</label><input id="blkEnd" type="date" value="${s&&s.dateEnd?s.dateEnd:""}"></div>
    <div class="field"><label>Créneau</label><select id="blkSlot">${slots.map(t=>`<option value="${t}" ${s&&(s.time||"")===t?"selected":""}>${t?t.replace(":","h"):"Toute la journée"}</option>`).join("")}</select></div>
    <div class="field"><label>Motif (optionnel)</label><input id="blkNote" value="${s?esc(s.notes||""):""}" placeholder="Mariage, vacances..."></div>
    <button class="btn wide" onclick="saveBlock('${id||""}')">${s?"Enregistrer":"Bloquer ce créneau"}</button>`;
  if(s) h+=`<button class="btn danger wide" style="margin-top:9px" onclick="deleteBlock('${id}')">Retirer ce blocage</button>`;
  openModal(h);
}
function saveBlock(id){
  const s=id?DB.seances.find(x=>x.id===id):null;
  let date=document.getElementById("blkDate").value;
  let end=document.getElementById("blkEnd").value;
  const time=document.getElementById("blkSlot").value;
  const notes=document.getElementById("blkNote").value.trim();
  if(!date){ toast("Choisis une date"); return; }
  if(end&&end<date){ const t=date; date=end; end=t; }
  const data={ brand:"mybabyshoot", type:"Indispo", date, dateEnd:(end&&end!==date)?end:"", time:time||"", status:"A venir", notes, place:"" };
  if(s){ Object.assign(s,data); } else { data.id=uid(); data.createdAt=Date.now(); DB.seances.push(data); }
  saveDB(); closeModal(); openBlocksList(); toast(s?"Blocage mis à jour":"Créneau bloqué");
}
function deleteBlock(id){
  const s=DB.seances.find(x=>x.id===id); if(!s) return;
  DB.deleted=(DB.deleted||[]).concat([id]);
  DB.seances=DB.seances.filter(x=>x.id!==id);
  saveDB(); closeModal(); openBlocksList(); toast("Blocage retiré");
}

function applyData(d){
  if(!d) return;
  applying=true;

    if(Array.isArray(d.deleted)){
      const dset=new Set(DB.deleted||[]); d.deleted.forEach(id=>dset.add(id)); DB.deleted=[...dset];
    }
    const del=new Set(DB.deleted||[]);
    if(Array.isArray(d.clients)) DB.clients=d.clients.filter(x=>x&&!del.has(x.id));
    if(Array.isArray(d.seances)) DB.seances=d.seances.filter(x=>x&&!del.has(x.id));
    if(Array.isArray(d.paiements)) DB.paiements=d.paiements.filter(x=>x&&!del.has(x.id));
    if(Array.isArray(d.taches)) DB.taches=d.taches.filter(x=>x&&!del.has(x.id));

}

/* Fusionne le cloud dans le local :
   - on retire ce qui a ete supprime (ici ou ailleurs)
   - on ajoute tout ce que le cloud a en plus (ex. prospects du site)
   Les suppressions sont memorisees pour ne jamais faire "revenir" une fiche effacee. */
function mergeCloud(cloud){
  if(Array.isArray(cloud.deleted)){
    const dset=new Set(DB.deleted||[]); cloud.deleted.forEach(id=>dset.add(id)); DB.deleted=[...dset];
  }
  const del=new Set(DB.deleted||[]);
  ["clients","seances","paiements","taches"].forEach(k=>{ DB[k]=(DB[k]||[]).filter(x=>x&&!del.has(x.id)); });
  let added=0;
  ["clients","seances","paiements","taches"].forEach(k=>{
    if(!Array.isArray(cloud[k])) return;
    const localIds=new Set((DB[k]||[]).map(x=>x&&x.id));
    cloud[k].forEach(item=>{
      if(item&&item.id&&!localIds.has(item.id)&&!del.has(item.id)){ DB[k].push(item); added++; }
    });
  });
  return added;
}
