/* ============================================================
   AUTHENTIFICATION (mot de passe + empreinte)
   Le mot de passe est verifie cote serveur : les donnees ne
   sortent du cloud que si la cle est bonne. L'empreinte sert de
   deverrouillage rapide sur mobile.
   ============================================================ */
const KEY_STORE="studio_matt_key";
const BIO_STORE="studio_matt_bio";
let CRM_KEY = "";
try{ CRM_KEY = localStorage.getItem(KEY_STORE) || ""; }catch(e){}
let authed=false;

function apiHeaders(json){
  const h = json ? {"Content-Type":"application/json"} : {"Accept":"application/json"};
  if(CRM_KEY) h["X-CRM-Key"]=CRM_KEY;
  return h;
}
function handleUnauthorized(){
  authed=false; CRM_KEY="";
  try{ localStorage.removeItem(KEY_STORE); }catch(e){}
  showLock();
}

async function cloudPull(){
  if(!CLOUD) return;
  try{
    const res=await fetch(ENDPOINT,{headers:apiHeaders(),cache:"no-store"});
    if(res.status===401){ handleUnauthorized(); return; }
    if(!res.ok) return;
    const d=await res.json();
    if(d&&(d.clients||d.seances||d.paiements||d.taches)){
      applyData(d);
      repaintActive();
      setSyncMsg("À jour.");
    }
  }catch(e){}
}

/* Recupere en douceur les nouveautes du cloud sans ecraser le travail local. */
async function pullMerge(){
  if(!CLOUD||applying||!authed) return 0;
  try{
    const res=await fetch(ENDPOINT,{headers:apiHeaders(),cache:"no-store"});
    if(res.status===401){ handleUnauthorized(); return 0; }
    if(!res.ok) return 0;
    const cloud=await res.json();
    const added=mergeCloud(cloud||{});
    if(added){ try{ localStorage.setItem(KEY,JSON.stringify(DB)); }catch(e){} repaintActive(); }
    return added;
  }catch(e){ return 0; }
}

function cloudPush(){
  if(!CLOUD||applying||!authed) return;
  clearTimeout(pushTimer);
  pushTimer=setTimeout(async ()=>{
    try{
      const res=await fetch(ENDPOINT,{headers:apiHeaders(),cache:"no-store"});
      if(res.status===401){ handleUnauthorized(); return; }
      if(res.ok){
        const cloud=await res.json();
        const added=mergeCloud(cloud||{});
        if(added){ try{ localStorage.setItem(KEY,JSON.stringify(DB)); }catch(e){} repaintActive(); }
      }
    }catch(e){}
    fetch(ENDPOINT,{method:"PUT",headers:apiHeaders(true),body:JSON.stringify(currentData())}).catch(()=>{});
    DB.lastPull=Date.now();
  },700);
}

/* verifie une cle candidate aupres du serveur */
async function verifyKey(candidate){
  try{
    const res=await fetch(ENDPOINT,{headers:{"Accept":"application/json","X-CRM-Key":candidate},cache:"no-store"});
    return res.status!==401;
  }catch(e){ return false; }
}

/* ---------- ecran de verrouillage ---------- */
function showLock(){
  const el=document.getElementById("lockScreen");
  if(el){ el.style.display="flex"; }
  document.body.style.overflow="hidden";
  const bio=bioEnabled();
  const bioZone=document.getElementById("bioZone");
  const passZone=document.getElementById("passZone");
  const sub=document.getElementById("lockSub");
  const retry=document.getElementById("bioRetry");
  if(bio){
    // empreinte en avant, mot de passe cache en secours
    bioZone.style.display="block";
    passZone.style.display="none";
    if(sub) sub.textContent="Déverrouille avec ton empreinte.";
    if(retry) retry.style.display="inline-block";
    // tentative automatique (echoue en silence sur mobile sans geste, le bouton prend le relais)
    setTimeout(()=>{ if(!authed) unlockWithBio(true); }, 150);
    // premier appui sur l'ecran : declenche l'empreinte
    armBioOnTap();
  } else {
    bioZone.style.display="none";
    passZone.style.display="block";
    if(sub) sub.textContent="Espace protégé.";
    if(retry) retry.style.display="none";
  }
}
function showPassZone(){
  document.getElementById("bioZone").style.display="none";
  document.getElementById("passZone").style.display="block";
  document.getElementById("lockSub").textContent="Entre ton mot de passe.";
  const inp=document.getElementById("lockPass"); if(inp) inp.focus();
}
let bioTapArmed=false;
function armBioOnTap(){
  if(bioTapArmed) return; bioTapArmed=true;
  const el=document.getElementById("lockScreen");
  const handler=(ev)=>{
    // on ignore les appuis sur les boutons/liens (ils ont deja leur action)
    if(ev.target.closest("button")) return;
    el.removeEventListener("pointerdown",handler);
    bioTapArmed=false;
    if(!authed) unlockWithBio(true);
  };
  el.addEventListener("pointerdown",handler);
}
function hideLock(){
  const el=document.getElementById("lockScreen");
  if(el){ el.style.display="none"; }
  document.body.style.overflow="";
}
async function submitPassword(){
  const inp=document.getElementById("lockPass");
  const err=document.getElementById("lockErr");
  const pass=(inp.value||"").trim();
  if(!pass){ return; }
  err.textContent="Vérification...";
  const ok=await verifyKey(pass);
  if(ok){
    CRM_KEY=pass;
    try{ localStorage.setItem(KEY_STORE,pass); }catch(e){}
    err.textContent="";
    inp.value="";
    onAuthenticated();
    // proposer l'empreinte via un bouton (l'activation doit partir d'un appui direct)
    setTimeout(offerBioIfPossible, 400);
  } else {
    err.textContent="Mot de passe incorrect.";
  }
}
function onAuthenticated(){
  authed=true;

  cloudPull();
}

/* ---------- empreinte digitale (WebAuthn) ---------- */
function bioEnabled(){ try{ return !!localStorage.getItem(BIO_STORE); }catch(e){ return false; } }
function b64(buf){ return btoa(String.fromCharCode(...new Uint8Array(buf))); }
function unb64(str){ return Uint8Array.from(atob(str), c=>c.charCodeAt(0)); }
async function bioAvailable(){
  try{
    if(!window.PublicKeyCredential || !window.isSecureContext) return false;
    return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
  }catch(e){ return false; }
}
async function offerBioIfPossible(){

      authenticatorSelection:{ authenticatorAttachment:"platform", userVerification:"required", residentKey:"preferred" },

async function unlockWithBio(silent){
  const err=document.getElementById("lockErr");
  const id=localStorage.getItem(BIO_STORE);
  if(!id){ return; }
  try{
    err.textContent="";
    const assertion=await navigator.credentials.get({ publicKey:{
      challenge: crypto.getRandomValues(new Uint8Array(32)),
      allowCredentials:[{ type:"public-key", id: unb64(id) }],
      userVerification:"required", timeout:60000
    }});
    if(assertion){ onAuthenticated(); }
  }catch(e){
    if(!silent){ err.textContent="Empreinte non reconnue. Tu peux utiliser ton mot de passe."; }

function urlB64ToUint8(base64){
  const pad="=".repeat((4-base64.length%4)%4);
  const b=(base64+pad).replace(/-/g,"+").replace(/_/g,"/");
  const raw=atob(b); const arr=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i);

  try{
    const perm=await Notification.requestPermission();
    if(perm!=="granted"){ toast("Autorisation refusée"); renderNotifs(); return; }
    const reg=await navigator.serviceWorker.ready;
    let sub=await reg.pushManager.getSubscription();
    if(!sub){ sub=await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey:urlB64ToUint8(VAPID_PUBLIC) }); }
    const res=await fetch(SUBSCRIBE_ENDPOINT,{ method:"POST", headers:Object.assign({"Content-Type":"application/json"}, CRM_KEY?{"X-CRM-Key":CRM_KEY}:{}), body:JSON.stringify(sub) });
    if(res.ok){ toast("Notifications activées"); } else { toast("Activation impossible"); }
  }catch(e){ toast("Activation impossible sur cet appareil"); }
  renderNotifs();
}
async function disableNotifs(){
  try{
    const reg=await navigator.serviceWorker.ready;
    const sub=await reg.pushManager.getSubscription();
    if(sub){
      fetch(SUBSCRIBE_ENDPOINT,{ method:"DELETE", headers:Object.assign({"Content-Type":"application/json"}, CRM_KEY?{"X-CRM-Key":CRM_KEY}:{}), body:JSON.stringify(sub) }).catch(()=>{});
      await sub.unsubscribe();
    }
    toast("Notifications désactivées");
  }catch(e){}
  renderNotifs();
}
async function renderNotifs(){
  const box=document.getElementById("notifCard");
  if(!box) return;
  if(!notifSupported()){
    box.innerHTML=`<div style="font-size:13.5px;color:var(--ink-2);line-height:1.55">Les notifications fonctionnent sur l'appli ajoutée à ton écran d'accueil. Sur iPhone, ouvre le CRM depuis son icône, pas depuis le navigateur.</div>`;
    return;
  }
  const on=await notifIsOn();
  let h=`<div style="font-size:13.5px;color:var(--ink-2);line-height:1.55;margin-bottom:12px">Reçois une alerte sur cet appareil dès qu'un devis ou une demande d'appel arrive du site, même appli fermée.</div>`;
  if(on){
    h+=`<div style="display:flex;align-items:center;gap:8px;color:var(--ok);font-size:13.5px;font-weight:600;margin-bottom:10px"><svg viewBox="0 0 24 24" style="width:17px;height:17px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round"><path d="M20 6L9 17l-5-5"/></svg>Notifications activées sur cet appareil</div>
      <button class="btn ghost sm wide" onclick="disableNotifs()">Désactiver sur cet appareil</button>`;
  } else {
    h+=`<button class="btn sm wide" onclick="enableNotifs()"><svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>Activer les notifications</button>`;
  }
  box.innerHTML=h;
}

/* ============================================================
   INIT
   ============================================================ */
if(CLOUD && "serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }
loadDB();
buildHome();
setView("home");
if(CLOUD){
  // acces protege : on passe par l'ecran de verrouillage
  showLock(); // showLock tente l'empreinte tout seul si elle est activee
  document.getElementById("lockPass").addEventListener("keydown",e=>{ if(e.key==="Enter") submitPassword(); });
  if(!bioEnabled() && CRM_KEY){
    // deja connecte sur cet appareil (PC) : on verifie la cle en silence
    verifyKey(CRM_KEY).then(ok=>{ if(ok){ onAuthenticated(); } });
  }
} else {
  // fichier local, pas de cloud : pas de verrou
  authed=true;
}

/* raccourci clavier Echap pour fermer le modal */
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });
</script>
